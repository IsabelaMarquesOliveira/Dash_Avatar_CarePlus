<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(15, 22, 34, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(17, 82, 212, 0.2);
        }
    </style>
</head>
<body class="bg-[#101622] text-slate-100 min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-md w-full text-center space-y-8 glass-effect p-10 rounded-3xl shadow-2xl">
        
        <div class="relative mx-auto size-24 bg-emerald-500/20 rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-emerald-500 text-6xl animate-bounce">check_circle</span>
            <div class="absolute inset-0 bg-emerald-500/20 blur-2xl rounded-full shadow-[0_0_30px_rgba(16,185,129,0.4)]"></div>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-black tracking-tight text-white">Consulta Agendada!</h1>
            <p class="text-slate-400">Seu Digital Twin já foi atualizado com as informações do Dr. Ricardo Silva.</p>
        </div>

        <div class="bg-slate-800/40 p-5 rounded-2xl border border-slate-700/50 text-left space-y-4">
            <div class="flex items-center gap-4">
                <div class="bg-primary/20 p-2 rounded-lg">
                    <span class="material-symbols-outlined text-primary text-2xl">calendar_today</span>
                </div>
                <div>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Data e Horário</p>
                    <span id="data-exibicao" class="text-sm font-semibold text-slate-200">Processando...</span>
                </div>
            </div>

            <div class="flex items-center gap-4 border-t border-slate-700/50 pt-4">
                <div class="bg-primary/20 p-2 rounded-lg">
                    <span class="material-symbols-outlined text-primary text-2xl">location_on</span>
                </div>
                <div>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Localização</p>
                    <span class="text-sm font-semibold text-slate-200">Telemedicina (Link via e-mail)</span>
                </div>
            </div>
        </div>

        <div class="pt-4">
            <a href="index.html" class="block w-full py-4 bg-primary hover:bg-primary/80 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/30 active:scale-95 text-center">
                Voltar para o Dashboard
            </a>
        </div>
    </div>

    <script>
        function carregarAgendamento() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // Pega a DATA e a HORA da URL
            const dataBruta = urlParams.get('data');
            const horaBruta = urlParams.get('hora'); 
            
            const display = document.getElementById('data-exibicao');

            if (dataBruta) {
                const partes = dataBruta.split('-');
                if (partes.length === 3) {
                    const dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                    
                    // Se a hora existir na URL, usa ela. Se não, usa 09:00.
                    const horaFinal = horaBruta ? horaBruta : "09:00";
                    
                    display.innerText = `${dataFormatada} às ${horaFinal}`;
                } else {
                    display.innerText = "Data inválida";
                }
            } else {
                display.innerText = "Data a confirmar";
            }
        }

        window.addEventListener('load', carregarAgendamento);
    </script>
</body>
</html>
