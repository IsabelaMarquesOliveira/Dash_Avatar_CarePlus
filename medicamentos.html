<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
    <div class="max-w-4xl mx-auto pb-12">
        
        <header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition-colors flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <h1 class="text-xl font-bold tracking-tight">Gerenciar Dados</h1>
            </div>
            <div class="size-10 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
        </header>

        <main class="p-4 space-y-8">
            <section class="space-y-4">
                <div class="flex items-center gap-2 px-1 text-slate-400">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                    <h2 class="text-xs font-black uppercase tracking-widest">Novo Medicamento</h2>
                </div>
                <div class="bg-white dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-medium mb-2 opacity-70">Nome</label>
                            <input id="med-nome" class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary px-4 py-3 outline-none transition-all" placeholder="Ex: Lisinopril" type="text"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 opacity-70">Dosagem</label>
                            <input id="med-dose" class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary px-4 py-3 outline-none" placeholder="Ex: 10mg" type="text"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2 opacity-70">Horário</label>
                            <input id="med-hora" class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary px-4 py-3 outline-none" type="time"/>
                        </div>
                        <div class="col-span-1 md:col-span-2">
                            <button onclick="adicionarMed()" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Adicionar à Lista
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <div class="flex items-center justify-between px-1">
                    <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Medicamentos Ativos</h2>
                    <span id="contador-med" class="text-[10px] bg-primary text-white px-2 py-0.5 rounded-full font-bold">2</span>
                </div>
                <div id="lista-meds" class="space-y-3">
                    <div class="flex items-center justify-between p-4 bg-white dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-800 group">
                        <div class="flex items-center gap-4">
                            <div class="size-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-primary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                            </div>
                            <div>
                                <h3 class="font-bold">Lisinopril</h3>
                                <p class="text-xs text-slate-500">10mg • Todos os dias às 08:00</p>
                            </div>
                        </div>
                        <button onclick="this.closest('div').remove(); atualizarContador();" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            </section>

            <section class="space-y-4">
                <div class="flex items-center gap-2 px-1 text-slate-400">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    <h2 class="text-xs font-black uppercase tracking-widest">Biometria</h2>
                </div>
                <div class="bg-white dark:bg-slate-900/50 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <input class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="Peso (kg)" type="number"/>
                        <input class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="Altura (cm)" type="number"/>
                        <input class="w-full rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 px-4 py-3 outline-none focus:ring-2 focus:ring-primary" placeholder="Glicose" type="number"/>
                        <button onclick="abrirSucesso()" class="sm:col-span-3 w-full bg-slate-200 dark:bg-slate-800 hover:bg-primary hover:text-white font-bold py-4 rounded-xl transition-all uppercase text-xs tracking-widest">
                            Atualizar Biometria
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-sucesso" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 modal-overlay" onclick="fecharSucesso()"></div>
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl p-8 text-center relative z-10 border border-slate-200 dark:border-slate-800 shadow-2xl">
            <div class="size-20 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h3 class="text-2xl font-black mb-2">Sucesso!</h3>
            <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">Sua biometria foi atualizada no seu Gêmeo Digital.</p>
            <button onclick="fecharSucesso()" class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white font-bold py-4 rounded-2xl transition-transform active:scale-95">
                Entendido
            </button>
        </div>
    </div>

    <script>
        function adicionarMed() {
            const nome = document.getElementById('med-nome').value;
            const dose = document.getElementById('med-dose').value;
            const hora = document.getElementById('med-hora').value;

            if(!nome || !dose || !hora) {
                alert("Por favor, preencha todos os campos do medicamento.");
                return;
            }

            const lista = document.getElementById('lista-meds');
            const novoItem = document.createElement('div');
            novoItem.className = "flex items-center justify-between p-4 bg-white dark:bg-slate-900/50 rounded-2xl border border-slate-200 dark:border-slate-800 group animate-in slide-in-from-top duration-300";
            
            novoItem.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="size-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-900 dark:text-white">${nome}</h3>
                        <p class="text-xs text-slate-500">${dose} • Todos os dias às ${hora}</p>
                    </div>
                </div>
                <button onclick="this.closest('div').remove(); atualizarContador();" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                </button>
            `;

            lista.prepend(novoItem);
            atualizarContador();
            
            // Limpa os campos
            document.getElementById('med-nome').value = "";
            document.getElementById('med-dose').value = "";
            document.getElementById('med-hora').value = "";
        }

        function atualizarContador() {
            const total = document.getElementById('lista-meds').children.length;
            document.getElementById('contador-med').innerText = total;
        }

        function abrirSucesso() {
            document.getElementById('modal-sucesso').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // trava o scroll ao abrir
        }

        function fecharSucesso() {
            document.getElementById('modal-sucesso').classList.add('hidden');
            document.body.style.overflow = 'auto'; // volta o scroll
        }
    </script>
</body>
</html>
